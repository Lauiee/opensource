services:
  stt-api:
    build:
      context: .
      target: full
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./models:/app/models
    restart: unless-stopped
    gpus: all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
