<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STT 결과 뷰어 v2.0 - 히포크랏 의료 음성 전사</title>
<style>
  :root {
    --bg:#0f172a; --surface:#1e293b; --surface2:#334155;
    --text:#e2e8f0; --text-muted:#94a3b8; --accent:#3b82f6;
    --accent-hover:#2563eb; --success:#22c55e; --warning:#f59e0b;
    --error:#ef4444; --error-bg:rgba(239,68,68,0.15);
    --warning-bg:rgba(245,158,11,0.15); --success-bg:rgba(34,197,94,0.1);
    --border:#475569; --radius:8px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Pretendard','Noto Sans KR',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
  .header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:16px}
  .header h1{font-size:18px;font-weight:700}
  .badge{background:var(--accent);color:#fff;padding:2px 8px;border-radius:12px;font-size:11px}
  .container{display:grid;grid-template-columns:260px 1fr 300px;height:calc(100vh - 52px)}

  /* File Panel */
  .file-panel{background:var(--surface);border-right:1px solid var(--border);overflow-y:auto}
  .file-panel h3{padding:14px 16px;font-size:13px;color:var(--text-muted);border-bottom:1px solid var(--border)}
  .file-item{padding:10px 16px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,0.04);transition:background .15s;display:flex;justify-content:space-between;align-items:center}
  .file-item:hover{background:var(--surface2)}
  .file-item.active{background:var(--accent);color:#fff}
  .file-item .name{font-size:13px;font-weight:500}
  .file-item .meta{font-size:11px;color:var(--text-muted)}
  .file-item.active .meta{color:rgba(255,255,255,0.7)}
  .upload-area{padding:14px}
  .upload-btn{width:100%;padding:10px;background:var(--surface2);border:1px dashed var(--border);border-radius:var(--radius);color:var(--text-muted);cursor:pointer;text-align:center;font-size:13px}
  .upload-btn:hover{border-color:var(--accent);color:var(--accent)}

  /* Main */
  .main-panel{overflow-y:auto;padding:20px}
  .audio-section{background:var(--surface);border-radius:var(--radius);padding:16px;margin-bottom:16px}
  .audio-section h3{font-size:13px;margin-bottom:10px;color:var(--text-muted)}
  .waveform-wrap{position:relative;height:72px;background:var(--bg);border-radius:6px;margin-bottom:10px;overflow:hidden;cursor:pointer}
  #waveCanvas{width:100%;height:100%}
  .wave-progress{position:absolute;top:0;left:0;width:0;height:100%;background:rgba(59,130,246,0.18);pointer-events:none}
  .wave-cursor{position:absolute;top:0;left:0;width:2px;height:100%;background:var(--accent);pointer-events:none}
  .audio-ctrl{display:flex;align-items:center;gap:10px}
  .audio-ctrl button{background:var(--accent);color:#fff;border:none;border-radius:6px;padding:7px 14px;cursor:pointer;font-size:12px}
  .audio-ctrl button:hover{background:var(--accent-hover)}
  .audio-ctrl .t{font-size:11px;color:var(--text-muted);font-variant-numeric:tabular-nums}
  .audio-ctrl input[type=range]{flex:1;accent-color:var(--accent)}
  .audio-ctrl select{background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:2px;font-size:11px}

  /* Segments */
  .seg-header-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .seg-header-bar h3{font-size:13px;color:var(--text-muted)}
  .filter-bar{display:flex;gap:6px}
  .filter-bar select{background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:3px 8px;font-size:11px}

  .seg{background:var(--surface);border-radius:var(--radius);padding:12px 14px;margin-bottom:6px;cursor:pointer;transition:all .12s;border-left:3px solid transparent;position:relative}
  .seg:hover{background:var(--surface2)}
  .seg.playing{border-left-color:var(--accent);background:rgba(59,130,246,0.07)}
  .seg.conf-low{border-left-color:var(--error);background:var(--error-bg)}
  .seg.conf-med{border-left-color:var(--warning);background:var(--warning-bg)}
  .seg.conf-high{border-left-color:var(--success)}
  .seg .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
  .seg .time{font-size:10px;color:var(--accent);font-variant-numeric:tabular-nums;font-weight:500}
  .seg .spk{font-size:10px;padding:1px 5px;border-radius:3px;font-weight:500}
  .spk.doc{background:rgba(59,130,246,0.2);color:#60a5fa}
  .spk.pat{background:rgba(34,197,94,0.2);color:#4ade80}
  .seg .txt{font-size:13px;line-height:1.6}
  .seg .txt[contenteditable=true]{outline:none;border:1px solid var(--accent);border-radius:4px;padding:3px 6px;background:var(--bg)}
  .conf-badge{position:absolute;top:12px;right:12px;font-size:9px;padding:1px 5px;border-radius:3px;font-weight:600}
  .conf-badge.h{background:var(--success-bg);color:var(--success)}
  .conf-badge.m{background:var(--warning-bg);color:var(--warning)}
  .conf-badge.l{background:var(--error-bg);color:var(--error)}
  .seg .acts{display:flex;gap:4px;margin-top:6px;opacity:0;transition:opacity .12s}
  .seg:hover .acts{opacity:1}
  .acts button{font-size:10px;padding:2px 6px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer}
  .acts button:hover{background:var(--surface2);color:var(--text)}
  .acts .sv{border-color:var(--success);color:var(--success)}
  .cdiff{margin-top:5px;font-size:11px;padding:3px 6px;background:var(--bg);border-radius:4px}
  .cdiff .o{text-decoration:line-through;color:var(--error)}
  .cdiff .c{color:var(--success);font-weight:500}

  /* Stats */
  .stats-panel{background:var(--surface);border-left:1px solid var(--border);overflow-y:auto;padding:14px}
  .stats-panel h3{font-size:13px;color:var(--text-muted);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
  .sc{background:var(--bg);border-radius:var(--radius);padding:10px;margin-bottom:6px}
  .sc .lb{font-size:10px;color:var(--text-muted);margin-bottom:2px}
  .sc .vl{font-size:22px;font-weight:700}
  .vl.g{color:var(--success)}.vl.w{color:var(--warning)}.vl.b{color:var(--error)}
  .sr{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:14px}
  .cbar-wrap{margin-bottom:14px}
  .cbar{display:flex;height:7px;border-radius:4px;overflow:hidden;margin-top:4px}
  .cbar .h{background:var(--success)}.cbar .m{background:var(--warning)}.cbar .l{background:var(--error)}
  .clog{margin-bottom:14px}
  .cl-item{padding:6px;border-bottom:1px solid rgba(255,255,255,0.04);font-size:11px}
  .cl-item .wr{color:var(--error);text-decoration:line-through}
  .cl-item .cr{color:var(--success)}
  .sp-sel{width:100%;padding:7px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);margin-bottom:14px;font-size:12px}
  .loading{text-align:center;padding:40px;color:var(--text-muted)}
  .spinner{display:inline-block;width:22px;height:22px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .empty{text-align:center;padding:50px 20px;color:var(--text-muted)}
  .empty h3{font-size:15px;margin-bottom:6px;color:var(--text)}
  .empty p{font-size:12px}
  ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--surface2);border-radius:3px}
</style>
</head>
<body>
<div class="header">
  <h1>STT 결과 뷰어</h1>
  <span class="badge">v2.0</span>
  <span style="flex:1"></span>
  <span id="st" style="font-size:11px;color:var(--text-muted)">준비</span>
</div>
<div class="container">
  <div class="file-panel">
    <div class="upload-area">
      <label class="upload-btn" id="ub">오디오 파일 업로드 (.wav, .mp3)<input type="file" accept="audio/*" id="fi" style="display:none"></label>
    </div>
    <h3>테스트 파일</h3>
    <div id="fl"><div class="loading"><div class="spinner"></div></div></div>
  </div>
  <div class="main-panel"><div id="mc"><div class="empty"><h3>파일을 선택하세요</h3><p>왼쪽에서 파일을 선택하거나 오디오를 업로드하세요</p></div></div></div>
  <div class="stats-panel" id="sp">
    <h3>통계 및 도구</h3>
    <label style="font-size:11px;color:var(--text-muted)">진료과</label>
    <select class="sp-sel" id="ss">
      <option value="">자동</option>
      <option value="정형외과">정형외과</option>
      <option value="안과">안과</option>
      <option value="간담도외과">간담도외과</option>
      <option value="소화기내과">소화기내과</option>
      <option value="내분비내과">내분비내과</option>
      <option value="호흡기내과">호흡기내과</option>
      <option value="감염내과">감염내과</option>
      <option value="비뇨기과">비뇨기과</option>
      <option value="정신건강의학과">정신건강의학과</option>
      <option value="신경과">신경과</option>
      <option value="내과">내과</option>
      <option value="산부인과">산부인과</option>
    </select>
    <div id="sc"><div class="empty"><p style="font-size:11px">파일 선택 후 표시됩니다</p></div></div>
  </div>
</div>
<audio id="ap" preload="auto"></audio>
<script>
const A='';let cf=null,segs=[],ap=document.getElementById('ap'),ci=-1;

async function loadFiles(){
  const el=document.getElementById('fl');
  try{
    const r=await fetch(A+'/api/viewer/files');
    if(!r.ok)throw 0;
    const d=await r.json(),fs=d.files||[];
    if(!fs.length)throw 0;
    el.innerHTML=fs.map(f=>`<div class="file-item" data-f="${f.name}" onclick="sel('${f.name}')"><div><div class="name">${f.name}</div><div class="meta">${f.size||''}</div></div></div>`).join('');
  }catch(e){
    el.innerHTML=Array.from({length:16},(_,i)=>`<div class="file-item" data-f="type${i+1}" onclick="sel('type${i+1}')"><div><div class="name">Type ${i+1}</div><div class="meta">테스트</div></div></div>`).join('');
  }
}

async function sel(n){
  document.querySelectorAll('.file-item').forEach(e=>e.classList.remove('active'));
  const a=document.querySelector(`[data-f="${n}"]`);if(a)a.classList.add('active');
  cf=n;ss('로딩...');
  document.getElementById('mc').innerHTML='<div class="loading"><div class="spinner"></div><p style="margin-top:10px;font-size:12px">전사 결과 로딩...</p></div>';
  try{
    const r=await fetch(A+`/api/viewer/file/${n}`);
    if(!r.ok)throw new Error(`HTTP ${r.status}`);
    const d=await r.json();segs=d.segments||[];
    render(d);stats(d);ss(`${n} - ${segs.length}개 세그먼트`);
  }catch(e){
    document.getElementById('mc').innerHTML=`<div class="empty"><h3>로드 실패</h3><p>${e.message}</p></div>`;ss('오류');
  }
}

function render(d){
  const s=d.segments||[],au=d.audio_url||'';
  let h=`<div class="audio-section"><h3>오디오 플레이어</h3>
    <div class="waveform-wrap" id="ww" onclick="seekW(event)"><canvas id="wc"></canvas><div class="wave-progress" id="wp"></div><div class="wave-cursor" id="wk"></div></div>
    <div class="audio-ctrl"><button onclick="tp()" id="pb">재생</button><span class="t" id="ct">0:00</span>
    <input type="range" id="sb" min="0" max="100" value="0" step="0.1" oninput="sa(this.value)">
    <span class="t" id="tt">0:00</span><span class="t">속도:</span>
    <select onchange="ap.playbackRate=parseFloat(this.value)"><option value="0.5">0.5x</option><option value="0.75">0.75x</option><option value="1" selected>1x</option><option value="1.25">1.25x</option><option value="1.5">1.5x</option></select>
    </div></div>`;
  h+=`<div><div class="seg-header-bar"><h3>전사 결과 (${s.length}개)</h3>
    <div class="filter-bar"><select id="cf" onchange="filt()"><option value="all">전체</option><option value="low">저신뢰도</option><option value="med">중간이하</option></select>
    <select id="sf" onchange="filt()"><option value="all">모든화자</option><option value="doc">의사</option><option value="pat">환자</option></select></div></div><div id="sl">`;
  s.forEach((g,i)=>{
    const c=cl(g),cc=c==='high'?'conf-high':c==='medium'?'conf-med':c==='low'?'conf-low':'';
    const sp=g.speaker||g.role||'',sc=sp.match(/의사|원장|doctor/i)?'doc':'pat';
    const cs=g.confidence||(g.avg_logprob?Math.round((1+g.avg_logprob/-1)*100):null);
    h+=`<div class="seg ${cc}" id="s${i}" data-i="${i}" data-s="${g.start}" data-e="${g.end}" data-sp="${sp}" data-c="${c}" onclick="ps(${i})">
      <div class="top"><span class="time">${ft(g.start)} - ${ft(g.end)}</span>${sp?`<span class="spk ${sc}">${esc(sp)}</span>`:''}</div>
      ${cs!==null?`<span class="conf-badge ${c[0]}">${cs}%</span>`:''}
      <div class="txt" id="t${i}">${esc(g.text||g.content||'')}</div>
      ${g.correction_log?cdiff(g.correction_log):''}
      <div class="acts"><button onclick="event.stopPropagation();ps(${i})">구간재생</button><button onclick="event.stopPropagation();ed(${i})">교정</button><button onclick="event.stopPropagation();sv(${i})" class="sv" id="sv${i}" style="display:none">저장</button></div></div>`;
  });
  h+='</div></div>';
  document.getElementById('mc').innerHTML=h;
  if(au){ap.src=au;ap.load();ap.onloadedmetadata=()=>{document.getElementById('tt').textContent=ft(ap.duration);dw()};ap.ontimeupdate=up}else dw();
}

function cdiff(ls){if(!ls||!ls.length)return'';return'<div class="cdiff">'+ls.map(l=>`<span class="o">${esc(l.original)}</span> → <span class="c">${esc(l.corrected)}</span>`).join('<br>')+'</div>';}

function stats(d){
  const s=d.segments||[];let tc=0,lc=0,mc=0,hc=0,cc=0;
  s.forEach(g=>{tc+=(g.text||g.content||'').length;const c=cl(g);if(c==='low')lc++;else if(c==='medium')mc++;else hc++;if(g.correction_log&&g.correction_log.length)cc++});
  const n=s.length||1,hp=(hc/n*100).toFixed(0),mp=(mc/n*100).toFixed(0),lp=(lc/n*100).toFixed(0);
  let h=`<div class="sr"><div class="sc"><div class="lb">세그먼트</div><div class="vl">${s.length}</div></div><div class="sc"><div class="lb">글자수</div><div class="vl">${tc.toLocaleString()}</div></div></div>
    <div class="sr"><div class="sc"><div class="lb">교정</div><div class="vl ${cc>0?'w':'g'}">${cc}</div></div><div class="sc"><div class="lb">저신뢰도</div><div class="vl ${lc>0?'b':'g'}">${lc}</div></div></div>
    <h3>신뢰도 분포</h3><div class="cbar-wrap"><div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text-muted)"><span>높음 ${hp}%</span><span>중간 ${mp}%</span><span>낮음 ${lp}%</span></div><div class="cbar"><div class="h" style="width:${hp}%"></div><div class="m" style="width:${mp}%"></div><div class="l" style="width:${lp}%"></div></div></div>`;
  const al=[];s.forEach(g=>{if(g.correction_log)g.correction_log.forEach(l=>al.push(l))});
  if(al.length){h+='<h3>교정 이력</h3><div class="clog">';al.slice(0,15).forEach(l=>{h+=`<div class="cl-item"><span class="wr">${esc(l.original)}</span> → <span class="cr">${esc(l.corrected)}</span></div>`});if(al.length>15)h+=`<div class="cl-item" style="color:var(--text-muted)">외 ${al.length-15}건</div>`;h+='</div>';}
  document.getElementById('sc').innerHTML=h;
}

function tp(){if(ap.paused){ap.play();document.getElementById('pb').textContent='일시정지'}else{ap.pause();document.getElementById('pb').textContent='재생'}}
function ps(i){
  const g=segs[i];if(!g)return;
  document.querySelectorAll('.seg').forEach(e=>e.classList.remove('playing'));
  document.getElementById('s'+i).classList.add('playing');ci=i;
  if(ap.src){ap.currentTime=g.start;ap.play();document.getElementById('pb').textContent='일시정지';
    const chk=()=>{if(ap.currentTime>=g.end){ap.pause();document.getElementById('pb').textContent='재생';ap.removeEventListener('timeupdate',chk)}};
    ap.addEventListener('timeupdate',chk)}
}
function sa(v){if(ap.duration)ap.currentTime=(v/100)*ap.duration}
function seekW(e){if(!ap.duration)return;const r=e.currentTarget.getBoundingClientRect();ap.currentTime=((e.clientX-r.left)/r.width)*ap.duration}
function up(){
  if(!ap.duration)return;const p=(ap.currentTime/ap.duration)*100;
  document.getElementById('sb').value=p;document.getElementById('ct').textContent=ft(ap.currentTime);
  const wp=document.getElementById('wp'),wk=document.getElementById('wk');if(wp)wp.style.width=p+'%';if(wk)wk.style.left=p+'%';
  const ct=ap.currentTime;segs.forEach((g,i)=>{const el=document.getElementById('s'+i);if(el&&ct>=g.start&&ct<g.end&&ci!==i){document.querySelectorAll('.seg').forEach(e=>e.classList.remove('playing'));el.classList.add('playing');el.scrollIntoView({behavior:'smooth',block:'nearest'});ci=i}});
}
function dw(){
  const cv=document.getElementById('wc');if(!cv)return;const ctx=cv.getContext('2d');
  cv.width=cv.offsetWidth*2;cv.height=cv.offsetHeight*2;ctx.scale(2,2);
  const w=cv.offsetWidth,h=cv.offsetHeight,mid=h/2;
  if(ap.duration&&segs.length){segs.forEach(g=>{const x1=(g.start/ap.duration)*w,x2=(g.end/ap.duration)*w;
    const c=cl(g);ctx.fillStyle=c==='low'?'rgba(239,68,68,0.1)':c==='medium'?'rgba(245,158,11,0.07)':'rgba(59,130,246,0.04)';
    ctx.fillRect(x1,0,x2-x1,h);ctx.strokeStyle='rgba(255,255,255,0.08)';ctx.lineWidth=0.5;ctx.beginPath();ctx.moveTo(x2,0);ctx.lineTo(x2,h);ctx.stroke()})}
  ctx.fillStyle='rgba(59,130,246,0.4)';for(let x=0;x<w;x+=3){const a=Math.random()*0.6+0.1,bh=a*h*0.38;ctx.fillRect(x,mid-bh,2,bh*2)}
}

function ed(i){const t=document.getElementById('t'+i);t.contentEditable=true;t.focus();document.getElementById('sv'+i).style.display='inline-block'}
async function sv(i){
  const t=document.getElementById('t'+i),nt=t.textContent.trim();t.contentEditable=false;document.getElementById('sv'+i).style.display='none';
  if(segs[i]){const orig=segs[i].text||segs[i].content||'';segs[i].text=nt;segs[i].content=nt;
    if(orig&&orig!==nt){try{await fetch(A+'/api/medical-dict/entries',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({wrong:orig,correct:nt,category:'사용자 교정',strategy:'exact',priority:60,notes:`뷰어 교정 (${cf})`})});ss('교정 저장 + 사전 학습')}catch(e){ss('교정 저장됨')}}}
}

function filt(){
  const cf=document.getElementById('cf')?.value||'all',sf=document.getElementById('sf')?.value||'all';
  document.querySelectorAll('.seg').forEach(el=>{let sh=true;
    if(cf==='low'&&el.dataset.c!=='low')sh=false;if(cf==='med'&&el.dataset.c==='high')sh=false;
    if(sf==='doc'&&!el.dataset.sp.match(/의사|원장|doctor/i))sh=false;if(sf==='pat'&&!el.dataset.sp.match(/환자|patient/i))sh=false;
    el.style.display=sh?'':'none'});
}

document.getElementById('fi').addEventListener('change',async e=>{
  const f=e.target.files[0];if(!f)return;ss('업로드 및 전사 중...');
  const fd=new FormData();fd.append('file',f);fd.append('language','ko');
  try{const r=await fetch(A+'/transcribe/file',{method:'POST',body:fd});const d=await r.json();segs=d.segments||[];
    render({segments:segs,audio_url:URL.createObjectURL(f)});stats({segments:segs});ss(`완료 - ${segs.length}개`)
  }catch(e){ss('업로드 실패: '+e.message)}
});

function ft(s){if(!s||isNaN(s))return'0:00';const m=Math.floor(s/60),sec=Math.floor(s%60);return`${m}:${String(sec).padStart(2,'0')}`}
function cl(g){const c=g.confidence||(g.avg_logprob?(1+g.avg_logprob/-1):null);if(c===null)return'unknown';return c>=0.8?'high':c>=0.5?'medium':'low'}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
